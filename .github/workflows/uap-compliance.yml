name: UAP Compliance Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check UAP Compliance
        run: |
          echo "=== UAP COMPLIANCE CHECK ==="
          
          score=0
          total=11
          
          # 1. SESSION START block — require the section, the task-ready
          # command, and the canonical session-start hook command so the
          # section can't be reduced to a one-liner stub.
          if grep -q "## SESSION START" CLAUDE.md && \
             grep -q "uap task ready" CLAUDE.md && \
             grep -q ".codex/hooks/session-start.sh" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ SESSION START block with uap task ready + hook"
          else
            echo "✗ SESSION START block MISSING"
            exit 1
          fi

          # 2. DECISION LOOP workflow — require the section header and a
          # reference to the Skill-import directive style so the loop
          # encodes specialized-workflow matching, not just generic steps.
          if grep -q "## DECISION LOOP" CLAUDE.md && grep -q "@Skill:name.md" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ DECISION LOOP with skills reference"
          else
            echo "✗ DECISION LOOP or skills reference MISSING"
            exit 1
          fi
          
          # 3. MANDATORY worktree enforcement
          # Accept either the section header style ("## WORKTREE WORKFLOW — MANDATORY")
          # or the gate-style header ("## WORKTREE GATE [REQUIRED..."), and require
          # the substantive command reference ("uap worktree create" or
          # "uap worktree ensure") to confirm the section isn't just a stub.
          if grep -qE "## WORKTREE WORKFLOW.*MANDATORY|## WORKTREE GATE \[REQUIRED" CLAUDE.md && \
             grep -q "uap worktree create\|uap worktree ensure" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ MANDATORY worktree enforcement present"
          else
            echo "✗ MANDATORY worktree enforcement MISSING"
            exit 1
          fi
          
          # 4. PARALLEL REVIEW PROTOCOL — require both the section header
          # and a reference to at least one canonical reviewer agent so a
          # bare stub heading can't satisfy the gate.
          if grep -q "## PARALLEL REVIEW PROTOCOL" CLAUDE.md && \
             grep -qE "code-reviewer|security-auditor|architect-reviewer" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ PARALLEL REVIEW PROTOCOL present"
          else
            echo "✗ PARALLEL REVIEW PROTOCOL MISSING"
            exit 1
          fi
          
          # 5. Schema diff gate ordering
          if grep -q "BLOCKING PREREQUISITES.*Schema Diff Gate\|1\. \*\*Schema Diff Gate" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ Schema diff gate in BLOCKING PREREQUISITES"
          else
            echo "✗ Schema diff gate NOT in blocking prerequisites"
            exit 1
          fi
          
          # 6. VERIFIER-FIRST section
          if grep -q "## VERIFIER-FIRST" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ VERIFIER-FIRST section present"
          else
            echo "✗ VERIFIER-FIRST MISSING"
            exit 1
          fi
          
          # 7. COMPLETION GATES - MANDATORY
          if grep -q "COMPLETION GATES.*-.*MANDATORY\|## COMPLETION GATES - MANDATORY" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ COMPLETION GATES - MANDATORY present"
          else
            echo "✗ COMPLETION GATES - MANDATORY MISSING"
            exit 1
          fi
          
          # 8. Pattern Router requirement
          if grep -q "Pattern.*Router\|pattern router" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ Pattern Router documented"
          else
            echo "✗ Pattern Router MISSING"
            exit 1
          fi
          
          # 9. Hook references — require the substantive session-start hook
          # reference. Older revisions used `@hooks-session-start.md` /
          # `@PreCompact.md` dangling import directives that resolved to
          # nothing on disk; accept either the dangling directive style (for
          # back-compat) or the substantive `.codex/hooks/session-start.sh`
          # command reference.
          if grep -q "@hooks-session-start.md\|@PreCompact.md\|.codex/hooks/session-start.sh\|.codex/hooks/pre-compact.sh" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ Hook references present"
          else
            echo "✗ Hook references MISSING"
            exit 1
          fi
          
          # 10. Verifier loop enforcement (min 3 runs)
          if grep -q "MANDATORY.*minimum 3 times\|MANDATORY.*3 times" CLAUDE.md; then
            score=$((score + 1))
            echo "✓ Verifier loop enforced (min 3 runs)"
          else
            echo "✗ Verifier loop enforcement MISSING"
            exit 1
          fi
          
          # 11. Template version tracking
          if grep -q "v2\.[2-9]\|v3\." CLAUDE.md; then
            score=$((score + 1))
            echo "✓ Template version tracked (v2.x+)"
          else
            echo "✗ Template version NOT tracked"
            exit 1
          fi
          
          echo ""
          echo "=== UAP COMPLIANCE SCORE: $score/$total ($(( score * 100 / total ))%) ==="
          
          if [ "$score" -ne "$total" ]; then
            echo "ERROR: Compliance check failed! Score: $score/$total"
            exit 1
          fi
          
          echo ""
          echo "✓ All compliance checks passed!"
